<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>建設現場工程進捗共有チャット</title>
    <link rel="stylesheet" href="css/reset.css">
    <link rel="stylesheet" href="css/style.css">
</head>

<body>

    <h1>建設現場工程進捗共有チャット</h1>
    <div class="chat-app">

        <div id="output" class="chat-output"></div>
    
        <div class="input-area">
    
            <input id="uname" type="text" placeholder="業者名">
    
            <select id="floor">
                <option value="">階を選択</option>
                <option value="1F">1F</option>
                <option value="2F">2F</option>
                <option value="3F">3F</option>
                <option value="RF">RF</option>
            </select>
        
    
        <div>
            <select id="area">
                <option value="">工区を選択</option>
                <option value="A工区">A工区</option>
                <option value="B工区">B工区</option>
                <option value="C工区">C工区</option>
            </select>
        </div>
    
        <div>
            <select id="trade">
                <option value="">工種を選択</option>
                <option value="配管">配管</option>
                <option value="ダクト">ダクト</option>
                <option value="保温">保温</option>
                <option value="計装">計装</option>
                <option value="機器搬入">機器搬入</option>
            </select>
        </div>
    
        <div>
            <input id="work" type="text" placeholder="作業内容">
        </div>
    
        <div>
            <select id="progress">
                <option value="">進捗率</option>
                <option value="5">5%</option>
                <option value="10">10%</option>
                <option value="15">15%</option>
                <option value="20">20%</option>
                <option value="25">25%</option>
                <option value="30">30%</option>
                <option value="35">35%</option>
                <option value="40">40%</option>
                <option value="45">45%</option>
                <option value="50">50%</option>
                <option value="55">55%</option>
                <option value="60">60%</option>
                <option value="65">65%</option>
                <option value="70">70%</option>
                <option value="75">75%</option>
                <option value="80">80%</option>
                <option value="85">85%</option>
                <option value="90">90%</option>
                <option value="95">95%</option>
                <option value="100">100%</option>
            </select>
        </div>
    
        <div>
            <textarea id="text" placeholder="コメントを入力"></textarea>
        </div>
    
        <button id="send">送信</button>
    
    
    </div>


    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.6.0/jquery.min.js"></script>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.1.0/firebase-app.js";
        import { getDatabase, ref, push, set, onChildAdded, remove, onChildRemoved }
            from "https://www.gstatic.com/firebasejs/9.1.0/firebase-database.js";

        const firebaseConfig = {
          
        };
        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app); 
        const dbRef = ref(db, "chat"); 

        //GASURL
        const gasUrl = "https://script.google.com/macros/s/AKfycbzFE0DSAm7OGfiwFP3bTI271tEdxBiS7hB25KVsZCQSPL96ixJTNLC6Dt6l5GOyOmEi/exec";

        console.log("JavaScript読み込みOK");

        //データ登録(Click)
        $("#send").on("click", function () {
            console.log("送信ボタン押された");

            const uname = $("#uname").val();
            const floor = $("#floor").val();
            const area = $("#area").val();
            const trade = $("#trade").val();
            const work = $("#work").val();
            const progress = $("#progress").val();
            const text = $("#text").val();

            // 通常のメッセージオブジェクト
            const msg = {
                uname: uname,
                floor: floor,
                area: area,
                trade: trade,
                work: work,
                progress: progress,
                text: text,
                type: "chat" 
            };

            console.log("Firebaseに送るデータ:", msg);
            const newPostRef = push(dbRef);

            // Firebaseへ保存
            set(newPostRef, msg)
            .then(() => {
                console.log("Firebase保存成功");

                // スプレッドシートへの連動送信
                fetch(gasUrl, {
                    method: "POST",
                    mode: "no-cors",
                    headers: {
                        "Content-Type": "text/plain"
                    },
                    body: JSON.stringify(msg)
                });
                console.log("GASへ送信しました");
            })
            .catch((error) => {
                console.log("Firebase保存失敗", error);
            });

            // 特定の進捗率に達した際のシステム自動通知
            if (
                progress === "25" ||
                progress === "50" ||
                progress === "75" ||
                progress === "100"
            ) {
                const notice = {
                    uname: "システム通知",
                    floor: floor,
                    area: area,
                    trade: trade,
                    work: work,
                    progress: progress,
                    text: `${floor}・${area}・${trade}「${work}」が${progress}%に到達しました。出来高支払書を送付しました。`,
                    type: "notice"
                };

                const noticeRef = push(dbRef);
                set(noticeRef, notice)
                .then(() => {
                    console.log("通知保存成功");
                })
                .catch((error) => {
                    console.log("通知保存失敗", error);
                });
            }

            // 入力欄を空にする
            $("#uname").val("");
            $("#floor").val("");
            $("#area").val("");
            $("#trade").val("");
            $("#work").val("");
            $("#progress").val("");
            $("#text").val("");
        });
        
        // データのリアルタイム受信と画面表示
        onChildAdded(dbRef, function(data){
            const msg = data.val();
            const key = data.key;
        
            // ガントチャート（進捗バー）の生成ロジック
            let progressBar = "";
            if (msg.progress) {
                const totalBlocks = 10; 
                const filledBlocks = Math.round(Number(msg.progress) / 10); 
                const emptyBlocks = totalBlocks - filledBlocks;
                progressBar = "■".repeat(filledBlocks) + "□".repeat(emptyBlocks);
            }

            let html = "";

            // メッセージタイプによって表示を切り替え
            if (msg.type === "notice") {
                html = `
                    <div class="msg-notice">
                        <p class="notice-text">📢 【進捗到達通知】<br>${msg.text}</p>
                    </div>
                `;
            } else {
                html = `
                    <div class="msg-box">
                        <div class="msg-header">
                            <span class="uname">${msg.uname}</span>
                            <span class="meta-info">${msg.floor} / ${msg.area} / ${msg.trade}</span>
                        </div>
                        <div class="msg-content">
                            <p class="work-title">作業: ${msg.work}</p>
                            <p class="gantt-bar">${progressBar} ${msg.progress}%</p>
                            <p class="user-text">${msg.text || ""}</p>
                        </div>
                    </div>
                `;
            }

            $("#output").append(html);
            $("#output").scrollTop($("#output")[0].scrollHeight);
        });
    </script>
</body>

</html>
